name: 功能建议 (Feature suggestions)
description: 建议添加新功能改进用户体验
title: "[Feature] "
labels: ["enhancement"]
assignees:
  - XCQ0607
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出建议！请填写以下内容，帮助我们理解你的需求。
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前核对 (Pre-submission Checklist)
      options:
        - label: 我已经搜索过 [Issue Tracker](https://github.com/XCQ0607/lxserver/issues)，确保没有重复的功能请求。
          required: true
        - label: 我已经查阅了设置，确认目前版本确实没有这个功能。
          required: true
  - type: textarea
    id: problem
    attributes:
      label: 你的建议与哪个痛点相关？ (Is your feature request related to a problem?)
      description: 请描述你现在的困扰。例如：我现在想要把“我的收藏”里的歌导出来发给朋友，但是找不到导出按钮，只能一张张截图，太麻烦了。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 你期望的解决方案 (Describe the solution you'd like)
      description: 请描述你希望如何实现这个功能。例如：在歌单右上角增加一个“导出为 CSV”或者“生成分享链接”的按钮。
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: 场景描述 (Use Case)
      description: 这个功能在什么场景下最有用？例如：当我想把电脑上整理好的歌单，快速同步到手机端播放器时。
  - type: markdown
    attributes:
      value: |
        ### 新音源支持 (New Music Source Support)
        ⚠️ **注意**：
        本项目仅维护自定义源/插件逻辑。如果你希望 LX Music 软件本身支持新的平台或核心功能，请直接向 [LX Music 官方仓库](https://github.com/lyswhut/lx-music-desktop/issues) 提交 Issue。
        
        如果你确定这是仅针对本项目（自定义源脚本）的建议，请在下方填写源的名称和网址：
  - type: input
    id: new_source_name
    attributes:
      label: 目标源名称/网址
  - type: input
    id: proxy_auth
    attributes:
      label: 是否需要特殊处理 (Proxy/Auth)
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案 (Describe alternatives you've considered)
      description: 你现在是怎么解决这个问题的？例如：我现在是用另外一个软件转换格式，然后再导入进来。
  - type: input
    id: deploy_hash
    attributes:
      label: 部署版本Hash (Deploy Hash)
      description: 可以从关于中查看 (Viewable in the About section)
      placeholder: "例如: a1b2c3d"
  - type: textarea
    id: additional
    attributes:
      label: 补充说明/截图 (Additional context/Screenshots)
      description: 如果有相关的 UI 设计草图、参考软件的截图，请贴在这里，这对我们需要很大帮助！
